<h2>主界面布局方案</h2>
<p class="subtitle">骑行时的主屏幕 — 请选择你喜欢的布局</p>

<div class="cards">

  <div class="card" data-choice="A" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#111;border-radius:6px;padding:10px;font-size:11px;color:#fff;line-height:1.6">
        <div style="background:#222;border-radius:4px;height:140px;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px;position:relative;margin-bottom:8px;">
          <span>📷 摄像头画面（全屏）</span>
          <div style="position:absolute;top:8px;left:8px;background:rgba(0,255,0,0.2);border:1px solid #0f0;border-radius:3px;padding:2px 6px;font-size:10px;color:#0f0">● 录制中</div>
          <!-- Skeleton overlay -->
          <div style="position:absolute;bottom:20px;right:20px;text-align:right;">
            <div style="font-size:10px;color:#4fc;margin-bottom:2px">膝盖 143° ✓</div>
            <div style="font-size:10px;color:#fc4;margin-bottom:2px">躯干 42° !</div>
            <div style="font-size:10px;color:#4fc">手肘 155° ✓</div>
          </div>
        </div>
        <div style="display:flex;gap:6px;">
          <div style="flex:1;background:#1a1a2e;border-radius:3px;padding:4px;text-align:center;font-size:10px">
            <div style="color:#888;margin-bottom:2px">膝盖角度</div>
            <div style="color:#4fc;font-size:14px;font-weight:bold">143°</div>
            <div style="color:#555;font-size:9px">理想 140-150°</div>
          </div>
          <div style="flex:1;background:#1a1a2e;border-radius:3px;padding:4px;text-align:center;font-size:10px">
            <div style="color:#888;margin-bottom:2px">躯干角度</div>
            <div style="color:#fc4;font-size:14px;font-weight:bold">42°</div>
            <div style="color:#555;font-size:9px">理想 35-45°</div>
          </div>
          <div style="flex:1;background:#1a1a2e;border-radius:3px;padding:4px;text-align:center;font-size:10px">
            <div style="color:#888;margin-bottom:2px">手肘角度</div>
            <div style="color:#4fc;font-size:14px;font-weight:bold">155°</div>
            <div style="color:#555;font-size:9px">理想 150-165°</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 摄像头全屏 + 底部数据栏</h3>
      <p>视频占主体，骨架线叠加在画面上，角度数字悬浮在右下角，底部一排小卡片显示当前数值和目标范围</p>
    </div>
  </div>

  <div class="card" data-choice="B" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#111;border-radius:6px;padding:10px;font-size:11px;color:#fff;line-height:1.6">
        <div style="display:flex;gap:8px;height:170px;">
          <div style="flex:2;background:#222;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#888;font-size:12px;position:relative;">
            <span>📷 摄像头画面</span>
            <div style="position:absolute;bottom:6px;left:6px;font-size:9px;color:#4fc">骨架叠加</div>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div style="flex:1;background:#1a1a2e;border-radius:4px;padding:6px;text-align:center;">
              <div style="color:#888;font-size:9px;margin-bottom:2px">膝盖</div>
              <div style="color:#4fc;font-size:16px;font-weight:bold">143°</div>
              <div style="height:4px;background:#333;border-radius:2px;margin-top:4px;"><div style="width:70%;height:100%;background:#4fc;border-radius:2px;"></div></div>
            </div>
            <div style="flex:1;background:#1a1a2e;border-radius:4px;padding:6px;text-align:center;">
              <div style="color:#888;font-size:9px;margin-bottom:2px">躯干</div>
              <div style="color:#fc4;font-size:16px;font-weight:bold">42°</div>
              <div style="height:4px;background:#333;border-radius:2px;margin-top:4px;"><div style="width:88%;height:100%;background:#fc4;border-radius:2px;"></div></div>
            </div>
            <div style="flex:1;background:#1a1a2e;border-radius:4px;padding:6px;text-align:center;">
              <div style="color:#888;font-size:9px;margin-bottom:2px">手肘</div>
              <div style="color:#4fc;font-size:16px;font-weight:bold">155°</div>
              <div style="height:4px;background:#333;border-radius:2px;margin-top:4px;"><div style="width:60%;height:100%;background:#4fc;border-radius:2px;"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 左大右小分栏</h3>
      <p>左侧摄像头画面，右侧竖排三个指标卡片，每个指标有进度条显示当前值在目标范围内的位置</p>
    </div>
  </div>

</div>
